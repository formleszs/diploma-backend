databaseChangeLog:
  - changeSet:
      id: 010-create-lecture-summaries
      author: studysync
      changes:
        - createTable:
            tableName: lecture_summaries
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: lecture_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: lecture_summaries
            baseColumnNames: lecture_id
            referencedTableName: lectures
            referencedColumnNames: id
            constraintName: fk_lecture_summary_lecture
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: lecture_summaries
            columnNames: lecture_id
            constraintName: uk_lecture_summary_lecture