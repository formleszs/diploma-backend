databaseChangeLog:
  - changeSet:
      id: 006-create-lectures
      author: studysync
      changes:
        - createTable:
            tableName: lectures
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: UPLOADED
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: lectures
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_lectures_project
            onDelete: CASCADE

        - createIndex:
            tableName: lectures
            indexName: idx_lectures_project
            columns:
              - column:
                  name: project_id

        - addUniqueConstraint:
            tableName: lectures
            columnNames: project_id,title
            constraintName: uk_lecture_project_title